{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-200">
        <div class="card-body">
            <div class="text-center mb-6">
                <div class="text-3xl mb-2">♻️</div>
                <h1 class="text-2xl font-bold">Welcome Back</h1>
                <p class="text-sm text-base-content/60">Sign in to your ReturnLess account</p>
            </div>

            <form method="POST" class="space-y-4">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Email</span>
                    </label>
                    <input type="email" name="email" placeholder="you@example.com"
                           class="input input-bordered w-full" required autocomplete="email">
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Password</span>
                    </label>
                    <input type="password" name="password" placeholder="••••••••"
                           class="input input-bordered w-full" required autocomplete="current-password">
                    <label class="label">
                        <a href="#" class="label-text-alt link link-hover">Forgot password?</a>
                    </label>
                </div>

                <div class="form-control">
                    <label class="label cursor-pointer justify-start gap-2">
                        <input type="checkbox" name="remember" class="checkbox checkbox-sm checkbox-primary">
                        <span class="label-text">Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-full btn-md">Sign In</button>
            </form>

            <div class="divider text-xs">OR</div>

            <p class="text-center text-sm">
                Don't have an account?
                <a href="{{ url_for('customers.register') }}" class="link link-primary font-medium">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
