databases:
  - name: returnless-db
    plan: free
    databaseName: returnless
    user: returnless

services:
  - type: web
    name: returnless
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python seed_expanded.py
    startCommand: gunicorn run:application --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: returnless-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
