<!-- Flash Messages / Toast Notifications -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="toast toast-top toast-end z-[100]" x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)">
            {% for category, message in messages %}
                <div class="alert
                    {% if category == 'success' %}alert-success
                    {% elif category == 'error' %}alert-error
                    {% elif category == 'warning' %}alert-warning
                    {% else %}alert-info{% endif %}
                    shadow-lg">
                    <span>{{ message }}</span>
                    <button class="btn btn-ghost btn-xs" @click="show = false">✕</button>
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}
