<!-- New User Size Prompt — asks for body measurements to predict size -->
<div class="card bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200 shadow-sm mt-3" data-theme="light">
    <div class="card-body p-4">
        <div class="flex items-center gap-2">
            <span class="text-xl">👋</span>
            <h4 class="font-bold text-sm text-amber-800">First time buying clothing?</h4>
        </div>

        <p class="text-xs text-amber-700 mt-2 leading-relaxed">
            Tell us your height and weight so our AI can predict your best size.
        </p>

        <!-- Body Measurements Form -->
        <form hx-post="{{ url_for('recommendations.save_body_measurements') }}"
              hx-target="#size-recommendation"
              hx-swap="innerHTML"
              class="mt-3 space-y-3">
            <input type="hidden" name="product_id" value="{{ product_id }}">

            <div class="grid grid-cols-2 gap-2">
                <div class="form-control">
                    <label class="label py-0">
                        <span class="label-text text-xs text-amber-800">Height (cm)</span>
                    </label>
                    <input type="number" name="height_cm" placeholder="170"
                           class="input input-bordered input-sm w-full" min="100" max="220" required>
                </div>
                <div class="form-control">
                    <label class="label py-0">
                        <span class="label-text text-xs text-amber-800">Weight (kg)</span>
                    </label>
                    <input type="number" name="weight_kg" placeholder="70"
                           class="input input-bordered input-sm w-full" min="30" max="200" required>
                </div>
            </div>

            <div class="form-control">
                <label class="label py-0">
                    <span class="label-text text-xs text-amber-800">Body Type (optional)</span>
                </label>
                <select name="body_type" class="select select-bordered select-sm w-full">
                    <option value="regular">Regular</option>
                    <option value="slim">Slim</option>
                    <option value="athletic">Athletic</option>
                    <option value="plus">Plus</option>
                </select>
            </div>

            <button type="submit" class="btn btn-sm btn-warning w-full">
                🤖 Predict My Size
            </button>
        </form>

        <div class="mt-3 p-2 bg-white/60 rounded-lg">
            <p class="text-xs text-amber-800 font-medium">💡 Or select manually:</p>
            <ul class="text-xs text-amber-700 mt-1 space-y-0.5">
                <li>• Check the product's size guide if available</li>
                <li>• Read reviews mentioning fit (some items run small/large)</li>
                <li>• When in doubt, size up for a relaxed fit</li>
            </ul>
        </div>
    </div>
</div>
